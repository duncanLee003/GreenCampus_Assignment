<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title></title>
        <meta http-equiv="X-UA-Compatible" content ="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="swiper-bundle.min.css">
        <link rel="stylesheet" href="style.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel="stylesheet">
    </head>
    <body>
        <nav>
            <div class ="nav-bar">
                <i class='bx bx-menu sidebarOpen'></i>
                <span class="logo navLogo"><a href="#">GreenCampus</a></span>

                <div class ="menu">
                    <div class="logo-toggle">
                        <span class ="logo" ><a href="#">GreenCampus</a></span>
                        <i class='bx bx-x siderbarClose'></i>
                    </div>
                        
                    <ul class="nav-links">
                        <li><a href = "index.html" >Home</a></li>
                        <li><a href = "events.html" >Events</a></li>
                        <li><a href = "tips.html" >Tips</a></li>
                        <li><a href = "resources.html" >Resources</a></li>
                        <li><a href = "aboutus.html" >About Us</a></li>
                    </ul> 
                    
                </div>
                    
                <div class="darkLight-searchBox">
                    <div class = "dark-light">
                        <i class='bx bx-moon moon'></i>
                        <i class='bx bx-sun sun'></i>
                    </div>

                       <div class = "searchBox">
                           <div class="searchToggle">
                               <i class='bx bx-x cancel'></i>
                               <i class='bx bx-search search'></i>
                           </div>
                               <div class="search-field">
                                   <input type= "text" placeholder = "Search...">
                                   <i class='bx bx-search'></i>
                               </div>
                            
                        </div>
                    </div>

                </span>

            </div>
        </nav>

        <div class="page-container">
            <div class="game-ui">
                <h1>Sustainability Goal Tracker</h1>
                <div class="streak-box">
                    <p>Streak: <span id="streakCount">0</span> days</p>
                </div>
                
                <h2>Level <span id="level">1</span></h2>
                

                <div class="progress-container">
                    <div class="progress-segments"></div>
                    <div class="progress-bar" id="xpBar"></div>
                    
                </div>

                <p id="xpMessage"></p>

                <p><span id="xp">0</span> / <span id="xpNeeded">100</span> XP</p>

                <button onclick="gainXP(20)">Complete Challenge (+20 XP)</button>

                

                <div id="reward"></div>

                <div class = "rowboardsection">
                    <div class="leaderboardcol">
                        <h3>Leaderboard</h3>

                        <table id="leaderboardTable">
                        <thead>
                            <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th>XP</th>
                            <th>Reward</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                        </table>

                        <input type="text" id="username" placeholder="Your name">
                        <button onclick="submitScore()">Submit Score</button>

                        <select id="titleSelector" onchange="changeTitle()"></select>
                    </div>
                    <div class = "galleryheading">
                        <h3>Photos taken by challengers</h3>
                    
                    
                        <div class = "galleryothers">
                            
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">
                            <img src="img/profile1.png" alt="" class="card-img">

                        </div>
                    </div>
                </div>

                <div class="challenge-grid" id="challengeGrid"></div>
                

                <button onclick="addChallenge()">+ Add Challenge</button>

                <select id="challengeFilter" onchange="renderChallenges()">
                    <option value="all" selected>All</option>
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                </select>

                <button onclick="showTab('active')">In Progress</button>
                <button onclick="showTab('completed')">Completed</button>
                <h3 id="activeTitle">In Progress</h3>
                <div class="challenge-grid" id="activeChallenges"></div>

                <h3 id="completedTitle">Completed</h3>
                <div class="challenge-grid" id="completedChallenges"></div>

                <h3>Quick Quiz</h3>

                <div id="quizBox" class="quiz-box">
                    <h4 id="questionText">Question here</h4>

                    <div id="answerButtons"></div>

                    <p id="quizFeedback"></p>

                    
                </div>

                <div id="popupModal" class="modal">
                <div class="modal-content">
                    <h3 id="modalTitle">Add Challenge</h3>

                    <input id="challengeName" placeholder="Challenge name">
                    <input id="challengeType" placeholder="Type (Daily/Weekly)">
                    <input id="challengeDesc" placeholder="Description">
                    <input id="challengeDays" type="number" placeholder="Days left">

                    <div class="modal-buttons">
                    <button onclick="confirmChallenge()">Save</button>
                    <button onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            </div>

        </div>
        
                       



    </body>
    <script src = "script.js"></script>


</html>
